services:
  postgres:
    image: postgres:16-alpine
    container_name: legal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: legal
      POSTGRES_PASSWORD: legal
      POSTGRES_DB: legal_management
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U legal -d legal_management']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: legal-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_TIMEZONE: Asia/Tehran
      DATABASE_URL: postgresql://legal:legal@postgres:5432/legal_management?schema=public
      JWT_SECRET: change-me-to-a-long-random-secret
      JWT_EXPIRES_IN: 8h
      UPLOAD_DIR: /app/uploads
    ports:
      - '3000:3000'
    volumes:
      - uploads_data:/app/uploads

volumes:
  postgres_data:
  uploads_data:
